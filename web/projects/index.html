<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pixl · Projects</title>
<link rel="icon" href="/index.icon.png">
<link rel="stylesheet" href="/pixl.css">
<style>
  .hero { padding: 24px 28px; margin-top: 8px; display: flex; align-items: flex-end; gap: 20px; flex-wrap: wrap; }
  .hero-actions { margin-left: auto; display: flex; gap: 10px; flex-wrap: wrap; }
  .ht-bar {
    display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
    margin: 20px 0; padding: 13px 18px 11px;
    font-size: 14px;
  }
  .ht-dot { width: 12px; height: 12px; border: 2px solid var(--stroke); }
  .ht-dot.on { background: var(--good); }
  .ht-dot.off { background: var(--bad); }
  .ht-bars { margin: 6px 0 20px; display: none; flex-direction: column; gap: 8px; max-width: 860px; }
  .ht-bars.show { display: flex; }
  .ht-row { padding: 10px 14px 9px; }
  .ht-row .top { display: flex; justify-content: space-between; gap: 10px; margin-bottom: 6px; font-size: 13px; }
  .bar { height: 12px; border: 3px solid var(--stroke); background: var(--panel-deep); overflow: hidden; }
  .bar > div { height: 100%; background: repeating-linear-gradient(90deg, var(--gold) 0 10px, var(--gold-soft) 10px 20px); }
  .section-h { font-size: 20px; color: var(--gold); text-shadow: 2px 2px 0 var(--stroke); margin: 26px 0 16px; letter-spacing: 1px; }
  .proj-card { display: flex; flex-direction: column; gap: 10px; }
  .proj-thumb {
    height: 140px; border: 3px solid var(--stroke);
    background: repeating-conic-gradient(rgba(255,209,102,.05) 0% 25%, transparent 0% 50%) 0 0 / 22px 22px, var(--panel-deep);
    display: flex; align-items: center; justify-content: center; font-size: 40px; overflow: hidden;
  }
  .proj-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .proj-name { font-size: 17px; color: var(--ink); }
  .proj-meta { font-size: 12px; color: var(--faint); display: flex; gap: 10px; flex-wrap: wrap; }
  .note-strip {
    font-size: 12px; line-height: 1.5; padding: 8px 10px 7px;
    border: 2px solid var(--stroke); background: rgba(160,44,44,.25); color: #ffc9c9;
  }
  .note-strip.teal { background: rgba(112,217,217,.12); color: var(--teal); }
  .editor { max-width: 900px; }
  .back-btn { margin-bottom: 18px; }
  .form-grid { display: flex; flex-direction: column; gap: 16px; padding: 24px; }
  .form-row { display: flex; flex-direction: column; gap: 7px; }
  .form-row label { font-size: 12px; color: var(--faint); letter-spacing: 1px; }
  .form-row textarea.field { resize: vertical; min-height: 80px; line-height: 1.6; }
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  @media (max-width: 640px) { .two-col { grid-template-columns: 1fr; } }
  .level-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  @media (max-width: 640px) { .level-row { grid-template-columns: repeat(2, 1fr); } }
  .level-btn {
    cursor: pointer; border: 3px solid var(--stroke); background: var(--panel-deep);
    color: var(--dim); font-size: 13px; padding: 10px 6px 8px; text-align: center;
  }
  .level-btn small { display: block; font-size: 10px; color: var(--faint); margin-top: 4px; line-height: 1.4; }
  .level-btn.sel { background: var(--gold); color: #2b1d12; }
  .level-btn.sel small { color: #4a3416; }
  .thumb-box { display: flex; gap: 16px; align-items: flex-start; flex-wrap: wrap; }
  .thumb-preview {
    width: 200px; height: 130px; border: 3px solid var(--stroke);
    background: repeating-conic-gradient(rgba(255,209,102,.05) 0% 25%, transparent 0% 50%) 0 0 / 20px 20px, var(--panel-deep);
    display: flex; align-items: center; justify-content: center; overflow: hidden; font-size: 30px;
  }
  .thumb-preview img { width: 100%; height: 100%; object-fit: cover; }
  .ht-pick { display: flex; flex-direction: column; gap: 6px; max-height: 220px; overflow-y: auto; border: 3px solid var(--stroke); background: var(--panel-deep); padding: 10px; }
  .ht-pick label { display: flex; align-items: center; gap: 10px; font-size: 13px; color: var(--ink); cursor: pointer; letter-spacing: 0; }
  .ht-pick input { accent-color: #ffd166; width: 16px; height: 16px; }
  .ht-pick .h { margin-left: auto; color: var(--teal); font-size: 12px; }
  .check-row { display: flex; align-items: center; gap: 10px; font-size: 14px; }
  .check-row input { accent-color: #ffd166; width: 17px; height: 17px; }
  .ship-list { display: flex; flex-direction: column; gap: 8px; font-size: 14px; }
  .ship-item { display: flex; gap: 10px; align-items: center; }
  .ship-item .ok { color: var(--good); }
  .ship-item .no { color: var(--bad); }
  .journal-entry { padding: 14px 16px; }
  .journal-entry .jmeta { font-size: 12px; color: var(--faint); margin-bottom: 7px; display: flex; gap: 12px; align-items: center; }
  .journal-entry .jdel { margin-left: auto; cursor: pointer; background: none; border: none; color: var(--faint); font-size: 12px; }
  .journal-entry .jdel:hover { color: var(--bad); }
  .journal-entry .jbody { font-size: 14px; line-height: 1.7; white-space: pre-wrap; word-break: break-word; }
  .jbody img, .jbody .bb-img { max-width: 100%; max-height: 260px; }
  .composer { padding: 16px; display: flex; flex-direction: column; gap: 10px; }
  .composer-foot { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .composer-foot input.field { width: 90px; }
  .danger-zone { margin-top: 30px; padding: 14px 18px; display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
  .btn.red { background: #c04444; color: #fff; }
  .status-approved { color: var(--good); }
  .status-shipped { color: var(--teal); }
  .status-needs { color: var(--bad); }
  .earned { color: var(--gold); }
  .connect-card { padding: 40px 30px; text-align: center; max-width: 560px; margin: 20px auto; }
  .connect-card h2 { color: var(--gold); font-size: 24px; text-shadow: 3px 3px 0 var(--stroke); margin-bottom: 12px; }
  .connect-card p { color: var(--dim); font-size: 14px; line-height: 1.8; margin-bottom: 22px; }
</style>
</head>
<body>
<main class="wrap">
  <section class="hero panel-deep">
    <div>
      <h1 class="page-title">PROJECTS</h1>
      <div class="page-sub">BUILD · JOURNAL · SHIP · GET PAID IN PIXELS.</div>
    </div>
    <div class="hero-actions">
      <a class="btn" href="#new" id="new-btn">+ NEW PROJECT</a>
    </div>
  </section>

  <div id="ht-slot"></div>
  <div class="spin" id="loading"></div>
  <div id="view"></div>
</main>

<script src="/pixl.js"></script>
<script>
Pixl.mountTopbar("projects");
Pixl.loadWallet();

const $ = (id) => document.getElementById(id);
const LEVELS = [
  ["L1 Greenhorn", "A first ship: simple site, script, or tiny tool."],
  ["L2 Deputy", "A focused app, CLI, or game with clean polish."],
  ["L3 Outlaw", "Multiple systems working together: backend, state, infra."],
  ["L4 Legend", "Deep systems work: complex architecture, serious scope."],
];
const ERRORS = {
  name_required: "Give it a name first.",
  repo_not_github: "The repo link must be a GitHub repository.",
  ai_notes_required: "Describe how you used AI (at least 10 characters).",
  repo_required: "Add a GitHub repo link before shipping.",
  demo_required: "Add a demo / playable link before shipping.",
  image_required: "Upload a thumbnail before shipping.",
  repo_not_found: "That repo link doesn't load — is it public?",
  demo_unreachable: "The demo link is unreachable.",
  hackatime_hours_required: "Link Hackatime projects with at least 1 hour of coding first.",
  hackatime_unavailable: "Hackatime is unreachable right now — try again in a bit.",
  update_notes_required: "Describe what changed in this update.",
  update_notes_too_short: "Update notes need at least 100 characters.",
  already_shipped: "This one is already in the review queue.",
  project_banned: "This project is banned and can't be shipped.",
  cdn_not_configured: "Image uploads aren't configured on the server.",
  cdn_failed: "Image upload failed — try again.",
};
const err = (e) => ERRORS[e] || "Something went wrong — try again.";

let stats = null;
let projects = [];
let form = null;

function statusInfo(p) {
  if (p.banned_at) return ["BANNED", "status-needs"];
  if (p.rejected_at) return ["REJECTED", "status-needs"];
  if (p.status === "approved") return ["APPROVED", "status-approved"];
  if (p.status === "shipped") return ["IN REVIEW", "status-shipped"];
  if (p.status === "needs_changes") return ["NEEDS CHANGES", "status-needs"];
  return ["DRAFT", "muted"];
}

function linkedSeconds(p) {
  if (!stats || !stats.connected) return 0;
  const linked = new Set(p.hackatime_projects || []);
  return stats.projects.filter((h) => linked.has(h.name)).reduce((s, h) => s + h.seconds, 0);
}

/* ---------- hackatime strip ---------- */

function renderHt() {
  const slot = $("ht-slot");
  if (!stats) { slot.innerHTML = ""; return; }
  if (!stats.connected) {
    slot.innerHTML = `
      <div class="ht-bar panel">
        <span class="ht-dot off"></span>
        <span>HACKATIME NOT CONNECTED — hours can't be counted until you link it.${stats.error ? ` <span class="faint">(${Pixl.esc(stats.error)})</span>` : ""}</span>
        <a class="btn" style="margin-left:auto" href="${Pixl.apiUrl("/hackatime/connect")}" target="_blank" rel="noopener" id="ht-connect">🔌 CONNECT</a>
      </div>`;
    $("ht-connect").addEventListener("click", () => {
      Pixl.toast("Finishing in the new tab — this page will refresh itself.");
      const poll = setInterval(async () => {
        try {
          const d = await Pixl.api("/api/hackatime/stats");
          if (d.stats && d.stats.connected) { clearInterval(poll); location.reload(); }
        } catch {}
      }, 3000);
      setTimeout(() => clearInterval(poll), 180000);
    });
    return;
  }
  const sorted = [...stats.projects].sort((a, b) => b.seconds - a.seconds);
  const top = sorted[0];
  slot.innerHTML = `
    <div class="ht-bar panel">
      <span class="ht-dot on"></span>
      <span>HACKATIME CONNECTED</span>
      <span class="teal">${Pixl.hours(stats.totalSeconds)} total</span>
      <span class="faint">·</span>
      <span class="muted">${stats.projects.length} tracked</span>
      <button class="btn ghost" style="margin-left:auto" id="ht-toggle">TIME PER PROJECT ▾</button>
      <a class="btn ghost" href="${Pixl.apiUrl("/hackatime/connect")}" target="_blank" rel="noopener">RECONNECT</a>
    </div>
    <div class="ht-bars" id="ht-bars">
      ${sorted.map((p) => `
        <div class="ht-row panel">
          <div class="top"><span>${Pixl.esc(p.name)}</span><span class="teal">${Pixl.hours(p.seconds)}</span></div>
          <div class="bar"><div style="width:${top && top.seconds ? (p.seconds / top.seconds) * 100 : 0}%"></div></div>
        </div>`).join("")}
    </div>`;
  $("ht-toggle").addEventListener("click", () => $("ht-bars").classList.toggle("show"));
}

/* ---------- list view ---------- */

function renderList() {
  $("new-btn").style.display = "";
  const view = $("view");
  if (projects.length === 0) {
    view.innerHTML = `
      <div class="connect-card panel">
        <div style="font-size:48px;margin-bottom:12px">🛠️</div>
        <h2>NO PROJECTS YET</h2>
        <p>Log what you're building, link it to Hackatime, journal as you go, then ship it for review — approved hours pay out in pixels.</p>
        <a class="btn" href="#new">+ START YOUR FIRST PROJECT</a>
      </div>`;
    return;
  }
  view.innerHTML = `
    <div class="section-h">MY PROJECTS · ${projects.length}</div>
    <div class="grid">
      ${projects.map((p) => {
        const [label, cls] = statusInfo(p);
        const secs = linkedSeconds(p);
        return `
        <a class="card panel proj-card" href="#p=${p.id}">
          <div class="proj-thumb">${p.image_url ? `<img src="${Pixl.esc(p.image_url)}" alt="" loading="lazy" onerror="this.remove()">` : "🛠️"}</div>
          <div class="proj-name">${Pixl.esc(p.name)}</div>
          <div><span class="chip ${cls}">${label}</span> <span class="chip">${LEVELS[(p.level || 1) - 1][0]}</span></div>
          <div class="proj-meta">
            ${secs ? `<span class="teal">${Pixl.hours(secs)} coded</span>` : `<span>no hackatime linked</span>`}
            ${p.pixels_earned ? `<span class="earned">+${Math.round(p.pixels_earned)} px earned</span>` : ""}
            <span>${Pixl.timeAgo(p.created_at)}</span>
          </div>
          ${p.status === "needs_changes" && p.review_note ? `<div class="note-strip">📝 ${Pixl.esc(p.review_note)}</div>` : ""}
          ${p.rejected_at && p.reject_reason ? `<div class="note-strip">❌ ${Pixl.esc(p.reject_reason)}</div>` : ""}
        </a>`;
      }).join("")}
    </div>`;
}

/* ---------- editor view ---------- */

function formHtml(p) {
  const linked = new Set(p.hackatime_projects || []);
  const htOpts = stats && stats.connected
    ? [...stats.projects].sort((a, b) => b.seconds - a.seconds).map((h) => `
        <label><input type="checkbox" name="ht" value="${Pixl.esc(h.name)}" ${linked.has(h.name) ? "checked" : ""}>
        ${Pixl.esc(h.name)}<span class="h">${Pixl.hours(h.seconds)}</span></label>`).join("")
    : `<span class="faint" style="font-size:13px">Connect Hackatime above to link coding time.</span>`;
  return `
    <div class="form-grid panel">
      <div class="form-row">
        <label>NAME *</label>
        <input class="field" id="f-name" maxlength="120" value="${Pixl.esc(p.name || "")}" placeholder="What are you building?">
      </div>
      <div class="form-row">
        <label>DESCRIPTION</label>
        <textarea class="field" id="f-desc" maxlength="2000" placeholder="What it is, what it does… (bbcode works)">${Pixl.esc(p.description || "")}</textarea>
      </div>
      <div class="two-col">
        <div class="form-row">
          <label>GITHUB REPO</label>
          <input class="field" id="f-repo" maxlength="500" value="${Pixl.esc(p.repo_url || "")}" placeholder="https://github.com/you/project">
        </div>
        <div class="form-row">
          <label>DEMO / PLAYABLE LINK</label>
          <input class="field" id="f-demo" maxlength="500" value="${Pixl.esc(p.demo_url || "")}" placeholder="https://…">
        </div>
      </div>
      <div class="form-row">
        <label>THUMBNAIL (required to ship)</label>
        <div class="thumb-box">
          <div class="thumb-preview" id="f-thumb-preview">${p.image_url ? `<img src="${Pixl.esc(p.image_url)}" alt="">` : "🖼️"}</div>
          <div style="display:flex;flex-direction:column;gap:8px">
            <button class="btn dark" id="f-thumb-btn" type="button">📁 CHOOSE IMAGE</button>
            <input type="file" id="f-thumb-file" accept="image/png,image/jpeg,image/webp,image/gif" hidden>
            <span class="faint" style="font-size:11px">or paste an image anywhere on this page</span>
          </div>
        </div>
      </div>
      <div class="form-row">
        <label>COMPLEXITY</label>
        <div class="level-row" id="f-levels">
          ${LEVELS.map(([l, tip], i) => `
            <button type="button" class="level-btn ${(p.level || 1) === i + 1 ? "sel" : ""}" data-level="${i + 1}">${l}<small>${tip}</small></button>`).join("")}
        </div>
      </div>
      <div class="form-row">
        <label>HACKATIME PROJECTS (proof of hours)</label>
        <div class="ht-pick">${htOpts}</div>
      </div>
      <div class="check-row">
        <input type="checkbox" id="f-ai" ${p.used_ai ? "checked" : ""}>
        <label for="f-ai" style="font-size:14px;color:var(--ink)">I used AI on this project</label>
      </div>
      <div class="form-row" id="f-ai-notes-row" ${p.used_ai ? "" : "hidden"}>
        <label>HOW DID YOU USE AI? *</label>
        <textarea class="field" id="f-ai-notes" maxlength="500" placeholder="Which parts, which tools…">${Pixl.esc(p.ai_notes || "")}</textarea>
      </div>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <button class="btn" id="f-save">${p.id ? "💾 SAVE" : "🚀 CREATE PROJECT"}</button>
        <a class="btn dark" href="#">CANCEL</a>
      </div>
    </div>`;
}

function bindForm(p) {
  form = { level: p.level || 1, imageUrl: p.image_url || "" };
  $("f-levels").addEventListener("click", (e) => {
    const b = e.target.closest(".level-btn");
    if (!b) return;
    form.level = Number(b.dataset.level);
    document.querySelectorAll(".level-btn").forEach((x) => x.classList.toggle("sel", x === b));
  });
  $("f-ai").addEventListener("change", () => { $("f-ai-notes-row").hidden = !$("f-ai").checked; });
  $("f-thumb-btn").addEventListener("click", () => $("f-thumb-file").click());
  $("f-thumb-file").addEventListener("change", () => {
    if ($("f-thumb-file").files[0]) setThumb($("f-thumb-file").files[0]);
  });
  $("f-save").addEventListener("click", () => saveProject(p));
}

async function setThumb(file) {
  Pixl.toast("Uploading image…");
  try {
    form.imageUrl = await Pixl.upload(file);
    $("f-thumb-preview").innerHTML = `<img src="${Pixl.esc(form.imageUrl)}" alt="">`;
    Pixl.toast("Thumbnail set!");
  } catch (e) { Pixl.toast(err(e.message), true); }
}

async function saveProject(p) {
  const body = {
    name: $("f-name").value.trim(),
    description: $("f-desc").value.trim(),
    repoUrl: $("f-repo").value.trim(),
    demoUrl: $("f-demo").value.trim(),
    imageUrl: form.imageUrl,
    level: form.level,
    usedAi: $("f-ai").checked,
    aiNotes: $("f-ai-notes").value.trim(),
    hackatimeProjects: [...document.querySelectorAll('input[name="ht"]:checked')].map((c) => c.value),
  };
  if (!body.name) return Pixl.toast(err("name_required"), true);
  $("f-save").disabled = true;
  const r = p.id
    ? await Pixl.send("PUT", `/api/projects/${p.id}`, body)
    : await Pixl.send("POST", "/api/projects", body);
  $("f-save").disabled = false;
  if (!r.ok) return Pixl.toast(err(r.error), true);
  Pixl.toast(p.id ? "Saved!" : "Project created!");
  await loadProjects();
  location.hash = "#p=" + r.project.id;
}

/* ---------- project detail ---------- */

async function renderProject(id) {
  const p = projects.find((x) => x.id === id);
  const view = $("view");
  if (!p) { view.innerHTML = `<div class="empty-note">PROJECT NOT FOUND.</div>`; return; }
  $("new-btn").style.display = "none";
  const [label, cls] = statusInfo(p);
  const secs = linkedSeconds(p);
  const canShip = ["draft", "needs_changes", "approved"].includes(p.status) || p.rejected_at;
  const isUpdate = p.status === "approved" && !p.rejected_at;
  view.innerHTML = `
    <a class="btn dark back-btn" href="#">← ALL PROJECTS</a>
    <div class="editor">
      <div class="section-h" style="margin-top:0;display:flex;gap:12px;align-items:center;flex-wrap:wrap">
        ${Pixl.esc(p.name)}
        <span class="chip ${cls}">${label}</span>
        ${p.pixels_earned ? `<span class="chip gold">+${Math.round(p.pixels_earned)} PX EARNED</span>` : ""}
      </div>
      ${p.status === "needs_changes" && p.review_note ? `<div class="note-strip" style="margin-bottom:14px">📝 REVIEWER: ${Pixl.esc(p.review_note)}</div>` : ""}
      ${p.rejected_at ? `<div class="note-strip" style="margin-bottom:14px">❌ REJECTED${p.reject_reason ? ": " + Pixl.esc(p.reject_reason) : ""} — fix it up and ship again.</div>` : ""}
      ${formHtml(p)}

      <div class="section-h">SHIP IT</div>
      <div class="form-grid panel">
        <div class="ship-list">
          <div class="ship-item"><span class="${p.repo_url ? "ok" : "no"}">${p.repo_url ? "✔" : "✘"}</span> GitHub repo linked</div>
          <div class="ship-item"><span class="${p.demo_url ? "ok" : "no"}">${p.demo_url ? "✔" : "✘"}</span> Demo link added</div>
          <div class="ship-item"><span class="${p.image_url ? "ok" : "no"}">${p.image_url ? "✔" : "✘"}</span> Thumbnail uploaded</div>
          <div class="ship-item"><span class="${secs >= 3600 ? "ok" : "no"}">${secs >= 3600 ? "✔" : "✘"}</span> ≥ 1h tracked on linked Hackatime projects <span class="teal">(${Pixl.hours(secs)})</span></div>
        </div>
        ${isUpdate ? `
        <div class="form-row">
          <label>WHAT CHANGED IN THIS UPDATE? * (min 100 chars)</label>
          <textarea class="field" id="s-notes" maxlength="2000" placeholder="This re-ships an approved project — describe the new work so reviewers only count the new hours."></textarea>
        </div>` : ""}
        <div class="check-row">
          <input type="checkbox" id="s-ysws">
          <label for="s-ysws" style="font-size:13px;color:var(--dim)">I already submitted this project to another Hack Club YSWS</label>
        </div>
        <div>
          <button class="btn ${canShip ? "" : "dark"}" id="s-ship" ${canShip ? "" : "disabled"}>
            ${p.status === "shipped" ? "⏳ IN REVIEW" : isUpdate ? "🚢 SHIP UPDATE" : "🚢 SHIP FOR REVIEW"}
          </button>
          <span class="faint" style="font-size:12px;margin-left:10px">Save your edits first — shipping uses what's saved.</span>
        </div>
      </div>

      <div class="section-h">DEVLOG</div>
      <div class="composer panel">
        <textarea class="field" id="j-content" maxlength="5000" placeholder="What did you build today? (bbcode works — paste an image to attach it)"></textarea>
        <div class="composer-foot">
          <button class="btn dark" id="j-img" type="button">🖼 ADD IMAGE</button>
          <input type="file" id="j-img-file" accept="image/png,image/jpeg,image/webp,image/gif" hidden>
          <span class="faint" style="font-size:12px">hours:</span>
          <input class="field" id="j-hours" type="number" min="0" max="100" step="0.5" value="0">
          <button class="btn" id="j-post">POST ENTRY</button>
        </div>
      </div>
      <div id="j-list" style="display:flex;flex-direction:column;gap:10px;margin-top:14px"><div class="spin"></div></div>

      <div class="danger-zone panel-deep">
        <span class="faint" style="font-size:13px">Done with this project?</span>
        <button class="btn red" id="p-delete">DELETE PROJECT</button>
      </div>
    </div>`;

  bindForm(p);
  $("s-ship").addEventListener("click", () => ship(p, isUpdate));
  $("j-img").addEventListener("click", () => $("j-img-file").click());
  $("j-img-file").addEventListener("change", async () => {
    const f = $("j-img-file").files[0];
    if (!f) return;
    Pixl.toast("Uploading image…");
    try {
      const url = await Pixl.upload(f);
      $("j-content").value += ($("j-content").value ? "\n" : "") + `[img]${url}[/img]`;
      Pixl.toast("Image attached!");
    } catch (e) { Pixl.toast(err(e.message), true); }
  });
  $("j-post").addEventListener("click", () => postJournal(p.id));
  $("p-delete").addEventListener("click", () => deleteProject(p));
  loadJournal(p.id);
}

async function ship(p, isUpdate) {
  const body = { otherYsws: $("s-ysws").checked };
  if (isUpdate) body.updateNotes = $("s-notes").value.trim();
  $("s-ship").disabled = true;
  Pixl.toast("Checking your repo and demo…");
  const r = await Pixl.send("POST", `/api/projects/${p.id}/ship`, body);
  $("s-ship").disabled = false;
  if (!r.ok) return Pixl.toast(err(r.error), true);
  Pixl.toast("🚢 SHIPPED! It's in the review queue.");
  await loadProjects();
  renderProject(p.id);
}

async function loadJournal(id) {
  let entries = [];
  try {
    const d = await Pixl.api(`/api/projects/${id}/journal`);
    entries = d.entries || [];
  } catch {}
  const list = $("j-list");
  if (!list) return;
  list.innerHTML = entries.length === 0
    ? `<div class="faint" style="font-size:13px;text-align:center;padding:14px">No entries yet — journal as you build, reviewers read these.</div>`
    : entries.map((e) => `
      <div class="journal-entry panel">
        <div class="jmeta">
          <span>${Pixl.timeAgo(e.created_at)}</span>
          ${e.hours ? `<span class="teal">${Number(e.hours).toFixed(1)}h</span>` : ""}
          <button class="jdel" data-id="${e.id}">✕ delete</button>
        </div>
        <div class="jbody">${Pixl.bbcode(e.content)}</div>
      </div>`).join("");
  list.querySelectorAll(".jdel").forEach((b) =>
    b.addEventListener("click", async () => {
      if (!confirm("Delete this journal entry?")) return;
      const r = await Pixl.send("DELETE", `/api/projects/${id}/journal/${b.dataset.id}`);
      if (r.ok) { Pixl.toast("Entry deleted."); loadJournal(id); }
      else Pixl.toast(err(r.error), true);
    }));
}

async function postJournal(id) {
  const content = $("j-content").value.trim();
  if (!content) return Pixl.toast("Write something first!", true);
  $("j-post").disabled = true;
  const r = await Pixl.send("POST", `/api/projects/${id}/journal`, {
    content,
    hours: Number($("j-hours").value) || 0,
  });
  $("j-post").disabled = false;
  if (!r.ok) return Pixl.toast(err(r.error), true);
  $("j-content").value = "";
  $("j-hours").value = "0";
  Pixl.toast("Entry posted!");
  loadJournal(id);
}

async function deleteProject(p) {
  if (!confirm(`Delete "${p.name}" and all its journal entries? This can't be undone.`)) return;
  if (!confirm("Really sure? Gone means gone.")) return;
  const r = await Pixl.send("DELETE", `/api/projects/${p.id}`);
  if (!r.ok) return Pixl.toast(err(r.error), true);
  Pixl.toast("Project deleted.");
  await loadProjects();
  location.hash = "#";
}

/* ---------- paste-to-upload (thumbnail while editing) ---------- */

document.addEventListener("paste", (e) => {
  const file = [...(e.clipboardData?.items || [])].find((i) => i.type.startsWith("image/"))?.getAsFile();
  if (!file) return;
  if (document.activeElement === $("j-content")) {
    e.preventDefault();
    Pixl.upload(file).then((url) => {
      $("j-content").value += ($("j-content").value ? "\n" : "") + `[img]${url}[/img]`;
      Pixl.toast("Image attached!");
    }).catch((x) => Pixl.toast(err(x.message), true));
  } else if ($("f-thumb-preview")) {
    e.preventDefault();
    setThumb(file);
  }
});

/* ---------- router ---------- */

function route() {
  if (!Pixl.hasToken) return;
  const h = location.hash.replace(/^#/, "");
  $("new-btn").style.display = "";
  if (h === "new") {
    $("new-btn").style.display = "none";
    $("view").innerHTML = `<a class="btn dark back-btn" href="#">← ALL PROJECTS</a><div class="editor">${formHtml({})}</div>`;
    bindForm({});
    return;
  }
  if (h.startsWith("p=")) return renderProject(Number(h.slice(2)));
  renderList();
}

async function loadProjects() {
  const d = await Pixl.api("/api/projects");
  projects = (d.projects || []).map((p) => ({ ...p, id: Number(p.id) }));
}

async function boot() {
  if (!Pixl.hasToken) return;
  try {
    const [s] = await Promise.all([Pixl.api("/api/hackatime/stats"), loadProjects()]);
    stats = s.stats || null;
  } catch (e) {
    if (e.message !== "unauthorized") Pixl.toast("Couldn't reach the server.", true);
  }
  $("loading").remove();
  renderHt();
  route();
}
window.addEventListener("hashchange", route);
boot();
</script>
</body>
