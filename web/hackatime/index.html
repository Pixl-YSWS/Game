<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pixl · Hackatime</title>
<link rel="icon" href="/index.icon.png">
<link rel="stylesheet" href="/pixl.css">
<style>
  .hero { padding: 26px 28px; margin-top: 8px; display: flex; align-items: flex-end; gap: 20px; flex-wrap: wrap; }
  .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin: 26px 0; }
  .big-stat { padding: 20px 22px 18px; text-align: center; }
  .big-stat .v { font-size: 34px; color: var(--gold); text-shadow: 3px 3px 0 var(--stroke); }
  .big-stat .k { font-size: 12px; color: var(--faint); letter-spacing: 2px; margin-top: 6px; }
  .connect-card { padding: 44px 34px; text-align: center; max-width: 560px; margin: 40px auto; }
  .connect-card .clock { font-size: 54px; margin-bottom: 14px; animation: tick 2s steps(2) infinite; display: inline-block; }
  @keyframes tick { 50% { transform: rotate(8deg); } }
  .connect-card h2 { color: var(--gold); font-size: 26px; text-shadow: 3px 3px 0 var(--stroke); margin-bottom: 12px; }
  .connect-card p { color: var(--dim); font-size: 14px; line-height: 1.8; margin-bottom: 24px; }
  .proj-rows { display: flex; flex-direction: column; gap: 10px; max-width: 860px; }
  .proj-row { padding: 14px 18px 12px; }
  .proj-row .top { display: flex; justify-content: space-between; gap: 12px; margin-bottom: 8px; font-size: 15px; }
  .proj-row .top .t { color: var(--teal); }
  .bar { height: 16px; border: 3px solid var(--stroke); background: var(--panel-deep); overflow: hidden; }
  .bar > div {
    height: 100%;
    background: repeating-linear-gradient(90deg, var(--gold) 0 10px, var(--gold-soft) 10px 20px);
    width: 0;
    transition: width .8s steps(16);
  }
  .section-h { font-size: 20px; color: var(--gold); text-shadow: 2px 2px 0 var(--stroke); margin: 8px 0 16px; letter-spacing: 1px; }
  .foot-note { margin-top: 30px; padding: 16px 20px; font-size: 13px; color: var(--dim); line-height: 1.8; max-width: 860px; }
</style>
</head>
<body>
<main class="wrap">
  <section class="hero panel-deep">
    <div>
      <h1 class="page-title">HACKATIME</h1>
      <div class="page-sub">EVERY CODING MINUTE, COUNTED — THIS IS WHAT PAYS YOUR PIXELS.</div>
    </div>
  </section>

  <div class="spin" id="loading"></div>
  <div id="content"></div>
</main>

<script src="/pixl.js"></script>
<script>
Pixl.mountTopbar("hackatime");
const walletPromise = Pixl.loadWallet();

function connectUrl() { return Pixl.apiUrl("/hackatime/connect"); }

async function boot() {
  if (!Pixl.hasToken) return;
  let stats = null;
  try {
    const data = await Pixl.api("/api/hackatime/stats");
    stats = data.stats || null;
  } catch (e) {
    if (e.message !== "unauthorized") Pixl.toast("Couldn't reach the server.", true);
  }
  document.getElementById("loading").remove();
  const content = document.getElementById("content");

  if (!stats || !stats.connected) {
    content.innerHTML = `
      <div class="connect-card panel">
        <span class="clock">⏰</span>
        <h2>NOT CONNECTED YET</h2>
        <p>Hackatime tracks the time you spend coding in your editor. Link it once and every project you ship can prove its hours — that's what turns into pixels.${stats && stats.error ? `<br><br><span class="faint">(${Pixl.esc(stats.error)})</span>` : ""}</p>
        <a class="btn" href="${connectUrl()}">🔌 CONNECT HACKATIME</a>
      </div>`;
    return;
  }

  const projects = [...(stats.projects || [])].sort((a, b) => b.seconds - a.seconds);
  const total = stats.totalSeconds || 0;
  const top = projects[0];
  const wallet = await walletPromise;

  content.innerHTML = `
    <div class="stats-row">
      <div class="big-stat panel"><div class="v">${Pixl.hours(total)}</div><div class="k">TOTAL CODED</div></div>
      <div class="big-stat panel"><div class="v">${projects.length}</div><div class="k">PROJECTS TRACKED</div></div>
      <div class="big-stat panel"><div class="v">${top ? Pixl.esc(top.name) : "—"}</div><div class="k">TOP PROJECT</div></div>
      ${wallet ? `<div class="big-stat panel"><div class="v">${wallet.pxPerHour} px/h</div><div class="k">YOUR APPROVAL RATE</div></div>` : ""}
    </div>

    <div class="section-h">TIME PER PROJECT</div>
    <div class="proj-rows">
      ${projects.length === 0 ? `<div class="empty-note">NO TRACKED PROJECTS YET — GO WRITE SOME CODE!</div>` : projects.map((p) => `
        <div class="proj-row panel">
          <div class="top"><span>${Pixl.esc(p.name)}</span><span class="t">${Pixl.hours(p.seconds)}</span></div>
          <div class="bar"><div data-w="${top && top.seconds ? (p.seconds / top.seconds) * 100 : 0}"></div></div>
        </div>`).join("")}
    </div>

    <div style="margin-top:26px;display:flex;gap:10px;flex-wrap:wrap">
      <a class="btn dark" href="${connectUrl()}">🔄 RECONNECT</a>
      <a class="btn" href="https://hackatime.hackclub.com" target="_blank" rel="noopener">OPEN HACKATIME ↗</a>
    </div>

    <div class="foot-note panel-deep">
      ⚙️ Hours land here automatically from the Hackatime plugin in your editor. Link a project to its Hackatime entries when you create it in-game (press <span class="gold">H</span>), journal as you build, then ship — approved hours pay out in pixels.
    </div>`;

  requestAnimationFrame(() =>
    content.querySelectorAll(".bar > div").forEach((b) => { b.style.width = b.dataset.w + "%"; }));
}
boot();
</script>
</body>
</html>
