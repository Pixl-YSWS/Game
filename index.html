<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>PixlGame</title>
    <!-- ── Pixelify Sans (Google Fonts) — used for titles only ──────── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap"
      rel="stylesheet"
    />
    <style>
      /* ── Kenney UI fonts (bundled in public/assets) — body text ──── */
      @font-face {
        font-family: "Kenney Future";
        src: url("/assets/kenney_ui-pack/Font/Kenney%20Future.ttf") format("truetype");
        font-display: block;
      }
      @font-face {
        font-family: "Kenney Future Narrow";
        src: url("/assets/kenney_ui-pack/Font/Kenney%20Future%20Narrow.ttf") format("truetype");
        font-display: block;
      }
      /* ── Monocraft (Minecraft-style chat font) ──────────────────────
         Download Monocraft.ttf from github.com/IdreesInc/Monocraft and drop
         it here. Until then chat falls back to Pixelify Sans (font-display
         swap = no invisible-text flash while loading). */
      @font-face {
        font-family: "Monocraft";
        src: url("/assets/fonts/Monocraft.ttf") format("truetype");
        font-display: swap;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        background: #0d0d0d;
        width: 100%;
        height: 100%;
        overflow: hidden;
        /* Stop mobile browsers from scrolling / pull-to-refresh on drag. */
        touch-action: none;
        overscroll-behavior: none;
        /* Default custom pixel cursor across the whole page. */
        cursor: url("/assets/kenney_cursor-pixel-pack/Tiles/tile_0026.png") 1 1, auto;
      }
      /* Fill the viewport so Phaser's FIT scale mode has a full-size parent to
         scale the canvas into (and centre it within). */
      #game-container {
        width: 100vw;
        height: 100vh;
      }
      #game-container canvas {
        display: block;
        image-rendering: pixelated; /* keep pixel art crisp */
        image-rendering: crisp-edges;
        cursor: url("/assets/kenney_cursor-pixel-pack/Tiles/tile_0026.png") 1 1, auto;
      }
      
      /* ── Bouton "Test the game" ──────────────────────────────────── */
      #test-game-btn {
        position: fixed;
        top: 20px;
        right: 20px;
        background-color: #ff0000;
        color: #ffffff;
        padding: 12px 24px;
        border: none;
        border-radius: 4px;
        font-family: "Pixelify Sans", sans-serif;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        z-index: 9999;
        text-decoration: none;
        display: inline-block;
        transition: background-color 0.2s ease;
      }
      
      #test-game-btn:hover {
        background-color: #cc0000;
      }
      
      #test-game-btn:active {
        background-color: #990000;
      }
    </style>
  </head>
  <body>
    <a id="test-game-btn" href="https://game.pixl.rsvp" target="_blank">Test the game</a>
    <div id="game-container"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
