<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Pixl: The Game</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap"
      rel="stylesheet"
    />
    <style>
      @font-face {
        font-family: "Kenney Future";
        src: url("/assets/kenney_ui-pack/Font/Kenney%20Future.ttf")
          format("truetype");
        font-display: block;
      }
      @font-face {
        font-family: "Kenney Future Narrow";
        src: url("/assets/kenney_ui-pack/Font/Kenney%20Future%20Narrow.ttf")
          format("truetype");
        font-display: block;
      }

      @font-face {
        font-family: "Monocraft";
        src: url("/assets/fonts/Monocraft.ttf") format("truetype");
        font-display: swap;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        background: #0d0d0d;
        width: 100%;
        height: 100%;
        overflow: hidden;

        touch-action: none;
        overscroll-behavior: none;

        cursor:
          url("/assets/kenney_cursor-pixel-pack/Tiles/tile_0026.png") 1 1,
          auto;
      }

      #game-container {
        width: 100vw;
        height: 100vh;
      }
      #game-container canvas {
        display: block;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
        cursor:
          url("/assets/kenney_cursor-pixel-pack/Tiles/tile_0026.png") 1 1,
          auto;
      }
    </style>
  </head>
  <body>
    <div id="game-container"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
