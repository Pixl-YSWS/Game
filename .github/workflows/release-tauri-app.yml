name: Release Tauri desktop app

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

# Only one release build per tag at a time.
concurrency:
  group: tauri-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-tauri:
    # tauri-action creates the GitHub Release, which needs write access to
    # repository contents (GITHUB_TOKEN defaults to read-only on most repos).
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            label: Linux
            args: ""
          - platform: windows-latest
            label: Windows
            args: ""
          - platform: macos-latest
            label: macOS (Apple Silicon + Intel)
            args: "--target universal-apple-darwin"

    runs-on: ${{ matrix.platform }}
    name: Build · ${{ matrix.label }}

    steps:
      - uses: actions/checkout@v4

      # ── Rust ────────────────────────────────────────────────────────────────
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          # Universal macOS binary needs both targets
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      # ── Linux system deps ───────────────────────────────────────────────────
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      # ── Node / Bun ──────────────────────────────────────────────────────────
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install JS dependencies
        run: bun install --frozen-lockfile

      # ── Tauri build + GitHub Release ────────────────────────────────────────
      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Vite bakes VITE_* env vars at build time.
          # Desktop app talks directly to the hosted server.
          VITE_SERVER_URL: https://server.pixl.rsvp
        with:
          # Creates the GitHub Release (or appends to it) automatically.
          tagName: ${{ github.ref_name }}
          releaseName: "PixlGame ${{ github.ref_name }}"
          releaseBody: |
            See [CONTRIBUTING.md](https://github.com/${{ github.repository }}/blob/main/CONTRIBUTING.md) for build instructions.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
